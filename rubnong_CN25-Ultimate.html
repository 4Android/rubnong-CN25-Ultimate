<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <title>เข้าสู่ระบบสายรหัส</title>
</head>

<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="video-background.mp4" type="video/mp4" autoplay loop muted playsinline>
    </video>

    <div class="container">
        <!-- ========================================== -->
        <!-- 🔐 ส่วนเข้าสู่ระบบ (Login) -->
        <!-- ========================================== -->
        <div id="login-section">
            <h1>Login</h1>
            <form id="login-form">
                <div class="data-form">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" placeholder="6910xxxxxx" maxlength="10" required>
                </div>

                <div class="data-form">
                    <label for="password">Password</label>
                    <!-- 🌟 ครอบด้วย wrapper เพื่อจำกัดวงให้ดวงตาชิดขวาของกล่องขาว -->
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Password" required>
                        <span id="toggle-password" class="eye-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>

                <button class="submit-btn" type="submit">Sign in</button>
            </form>
            <p class="toggle-text">ยังไม่มีบัญชี? <a href="#" id="go-to-register">ลงทะเบียนที่นี่</a></p>
        </div>

        <!-- ========================================== -->
        <!-- 📝 ส่วนลงทะเบียน (Register) -->
        <!-- ========================================== -->
        <div id="register-section" style="display: none;">
            <h1>Register</h1>
            <form id="register-form">
                <div class="data-form">
                    <label for="reg-student-id">Student ID</label>
                    <input type="text" id="reg-student-id" placeholder="6910xxxxxx" maxlength="10" required>
                </div>

                <div class="data-form">
                    <label for="reg-name">Nickname</label>
                    <input type="text" id="reg-name" placeholder="ชื่อเล่นของน้อง" required>
                </div>

                <div class="data-form">
                    <label for="reg-password">Password</label>
                    <!-- 🌟 ใส่ wrapper ให้ฝั่ง Register ด้วยเพื่อความสวยงามเหมือนกัน -->
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="ตั้งรหัสผ่าน" required>
                        <span id="toggle-reg-password" class="eye-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>

                <button class="submit-btn" type="submit">สร้างบัญชี</button>
            </form>
            <p class="toggle-text">มีบัญชีอยู่แล้ว? <a href="#" id="go-to-login">กลับไปหน้าเข้าสู่ระบบ</a></p>
        </div>

    </div>

    <script type="module" src="auth.js"></script>

    <script>
        function setupPasswordToggle(toggleId, passwordId) {
            const toggle = document.getElementById(toggleId);
            const field = document.getElementById(passwordId);

            if (toggle && field) {
                toggle.addEventListener('click', function () {
                    const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
                    field.setAttribute('type', type);

                    if (type === 'password') {
                        this.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
                    } else {
                        this.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
                    }
                });
            }
        }
        // สั่งให้ทำงานทั้ง 2 จุด
        setupPasswordToggle('toggle-password', 'password');
        setupPasswordToggle('toggle-reg-password', 'reg-password');
    </script>

</body>

</html>
